<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method ="POST" action="#">
        <fieldset>
            <legend>Infos personnelles</legend>
        
            <label for="prenom">Prénom</label>
            <input type="text" name="prenom" placeholder="Ex:Jacques" minlength="2" maxlength="20" id="prenom"/>

            <br>

            <label for="nom">Nom</label>
            <input type="text" name="nom" placeholder="Ex:Dubois" minlength="2" maxlength="20" id="nom"/>

            <br>

            <label for="email">E-mail</label>
            <input type="text" name="email" placeholder="Ex:monMail@FAI.com" id="email"/>

            <br>

            <label for="tel">Numéro</label>
            <input type="tel" name="tel" placeholder="Ex: 00 11 22 33 44" id="tel"/>

            <br>

            <label for="password">Mot de passe</label>
            <input type="password" name="password" placeholder="Ex: P@ssword" minlength="8" maxlength="30" id="password"/>

            <br>

            <label for="age">Age</label>
            <input type="number" name="age" placeholder="Ex: 15" id="age"/>

            <br>

            <label for="commentaire">Laissez un commentaire:</label>
            <br>
            <textarea rows="10" cols="70" placeholder="J'adore ton travail!" id="commentaire"></textarea>

            <br>

            <label for="date">Date de mon commentaire</label>
            <input type="date" name="date"/>

            <br>

            <label for="fichier">Ma photo</label>
            <input type="file"  accept =".png, .jpeg, .gif" name="fichier"/>

        </fieldset>

        <fieldset>
            <legend> Vous préferez</legend>
            <input type="checkbox" id="checkbox" checked=""/> <label for="language">Le HTML</label>
            <br>
             <input type="checkbox" id="checkbox"/> <label for="language">Le CSS</label>
             <br>
             <input type="checkbox" id="checkbox"/> <label for="language">Le JavaScript</label>
             <br>
             <input type="checkbox" id="checkbox"/> <label for="language">Ne rien faire</label>

        </fieldset>

        <fieldset>
            <legend> Vous vous levez</legend>
            <input type="radio" id="radio1" name="radio" value="radio1" checked=""/> <label for="choix">Le matin</label>
            <br>
             <input type="radio" id="radio2" name="radio" value="radio2"/> <label for="choix">Le midi</label>
             <br>
             <input type="radio" id="radio3" name="radio" value="radio3"/> <label for="choix">Le soir</label>
             <br>
             <input type="radio" id="radio4" name="radio" value="radio4"/> <label for="choix">En retard !</label>

        </fieldset>

        <fieldset>
            <legend>Fin du formulaire</legend>
            <label for="liste">Vous en avez assez ?</label>
            <select name="liste" id ="liste">
                <optgroup label="Team Pas enore">
                    <option value="option1" selected="">J'en veux plus</option>
                    <option value="option2">C'est super !</option>
                </optgroup>
                <optgroup label="Team Oula">
                    <option value="option1">J'en ai marre</option>
                    <option value="option2">Pitié !</option>
                </optgroup>
            </select>
            <br/>

            <button type="submit" value="Envoyer"> Envoyer</button>
            <button type="reset" value="reset">Reset</button>


        

        </fieldset>

    </form>
</body>
</html>
